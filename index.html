<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mouadisfree</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f2f2f2;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 40px 16px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ── Avatar ── */
    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 16px;
      border: 3px solid #fff;
      box-shadow: 0 2px 12px rgba(0,0,0,.12);
    }

    /* ── Name & bio ── */
    .name {
      font-size: 1.35rem;
      font-weight: 700;
      color: #111;
      margin-bottom: 6px;
    }

    .bio {
      font-size: 0.9rem;
      color: #666;
      text-align: center;
      line-height: 1.5;
      margin-bottom: 28px;
      max-width: 300px;
    }

    /* ── Links ── */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      background: #fff;
      border-radius: 14px;
      text-decoration: none;
      color: #111;
      font-size: 0.95rem;
      font-weight: 500;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      position: relative;
    }

    .link-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 14px rgba(0,0,0,.12);
    }

    .link-item:active {
      transform: translateY(0);
    }

    .link-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }

    .link-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .link-icon svg {
      width: 22px;
      height: 22px;
    }

    .link-label { flex: 1; }

    .chevron {
      color: #bbb;
      font-size: 1.1rem;
    }

    /* icon backgrounds */
    .icon-instagram { background: linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
    .icon-youtube   { background: #ff0000; }
  </style>
</head>
<body>
  <div class="card">

    <!-- Photo — replace src with your own image file or URL -->
    <img
      class="avatar"
      src="mouadisfree.jpg"
      alt="mouadisfree"
      onerror="this.src='https://ui-avatars.com/api/?name=mouadisfree&background=222&color=fff&size=96'"
    />

    <h1 class="name">mouadisfree</h1>
    <p class="bio">Developer &amp; creator</p>

    <div class="links">

      <!-- Instagram -->
      <a class="link-item" href="https://www.instagram.com/mouadisfree/" target="_blank" rel="noopener">
        <span class="link-icon icon-instagram">
          <!-- Instagram SVG -->
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="24" height="24" rx="5" fill="transparent"/>

          </svg>
        </span>
        <span class="link-label">Instagram</span>
        <span class="chevron">›</span>
      </a>

      <!-- YouTube -->
      <a class="link-item" href="https://www.youtube.com/@mouadisfree" target="_blank" rel="noopener">
        <span class="link-icon icon-youtube">
          <!-- YouTube SVG -->
          <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
            <path d="M23.498 6.186a3.016 3.016 0 00-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 00.502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 002.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 002.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
          </svg>
        </span>
        <span class="link-label">YouTube</span>
        <span class="chevron">›</span>
      </a>

    </div>
  </div>
</body>
</html>
